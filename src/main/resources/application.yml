server:
  port: 8080

spring:
  application:
    name: guacamole-recording-player
  thymeleaf:
    cache: false

recordings:
  # Path inside the running app/container where Guacamole recordings are mounted.
  # Override with RECORDINGS_ROOT if preferred.
  root: ${RECORDINGS_ROOT:/recordings}

management:
  endpoints:
    web:
      exposure:
        include: health,info
